ai_usage_summary: |
  Used ChatGPT for architecture design, debugging support, and code optimization suggestions.
  No candidate data was processed or sent to any external model.
  All ranking logic runs locally and deterministically.

methodology_summary: |
  A multi-signal deterministic candidate ranking system designed for retrieval-heavy ML roles.
  It combines:
  - Skill fit scoring (40%) using both explicit skills and full career text extraction
  - Title & career trajectory scoring (20%) to detect alignment with ML/search engineering roles
  - Experience depth scoring (20%) with optimal weighting for 5–9 years range
  - Location preference scoring (10%) based on hiring geography constraints
  - Education tier scoring (10%) with slight bonus for relevant fields

  A behavioral multiplier (0.3–1.3x) adjusts ranking based on real-world hiring signals
  like activity recency, recruiter engagement, open-to-work status, notice period, and GitHub activity.

  Honeypot detection penalizes inconsistent timelines, unrealistic skill endorsements,
  and fabricated activity signals.

  System is fully offline, CPU-only, and reproducible in under ~2 minutes for 100K candidates.

